<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pop o'Clock</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: manipulation; }

        body {
            background: #020c1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #game {
            position: relative;
            width: 100vw;
            height: 100dvh;
            max-width: 390px;
            max-height: 844px;
            background: linear-gradient(180deg,
                #08101e 0%,
                #0b2440 25%,
                #0d4470 60%,
                #0d6080 100%);
            overflow: hidden;
        }

        #game::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 20% at 30% 5%, rgba(0,180,255,0.07) 0%, transparent 100%),
                radial-gradient(ellipse 60% 15% at 70% 8%, rgba(0,220,255,0.05) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── HUD ─────────────────────────────────────────────── */
        #hud {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 18px 22px 14px;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0,0,0,0.52) 0%, transparent 100%);
        }

        #hud-row1 {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 9px;
        }

        #level-label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(140, 210, 255, 0.8);
        }

        #timer-secs {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 16px rgba(80,200,255,0.6);
            min-width: 32px;
            text-align: right;
        }

        #timer-track {
            width: 100%;
            height: 7px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            width: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #00e5ff, #00ffa3);
            box-shadow: 0 0 10px rgba(0,230,255,0.6);
        }

        #pop-counter {
            margin-top: 9px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(190, 220, 255, 0.65);
            text-align: center;
            transition: color 0.3s;
        }

        #pop-counter.met {
            color: #00e6b4;
            text-shadow: 0 0 12px rgba(0,230,180,0.55);
        }

        @keyframes popCountPunch {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .pop-punch {
            animation: popCountPunch 0.18s ease-out;
        }

        /* ── Bubbles ─────────────────────────────────────────── */
        .bubble {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            z-index: 10;
        }

        .bubble .shine {
            position: absolute;
            top: 10%; left: 14%;
            width: 30%; height: 20%;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
        }

        .bubble .shine2 {
            position: absolute;
            bottom: 18%; right: 16%;
            width: 14%; height: 10%;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            filter: blur(1px);
            pointer-events: none;
        }

        /* ── Bubble spawn animation ──────────────────────────── */
        @keyframes bubbleSpawn {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .bubble-spawn {
            animation: bubbleSpawn 0.35s ease-out forwards;
        }

        /* ── Particles ───────────────────────────────────────── */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 150;
        }

        /* ── Intro screen ────────────────────────────────────── */
        #intro {
            position: absolute;
            inset: 0;
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            background: linear-gradient(180deg,
                rgba(4, 10, 24, 0.97) 0%,
                rgba(8, 22, 50, 0.97) 50%,
                rgba(10, 50, 80, 0.97) 100%);
        }

        #intro.hidden { display: none; }

        #intro-title {
            font-size: 58px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 50px rgba(0,200,255,0.75), 0 4px 18px rgba(0,0,0,0.6);
            line-height: 1;
            margin-bottom: 8px;
        }

        #intro-title span {
            color: #00e5ff;
        }

        #intro-tagline {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(100, 200, 255, 0.45);
            margin-bottom: 56px;
        }

        #name-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(140, 200, 255, 0.55);
            align-self: flex-start;
            margin-left: 11%;
            margin-bottom: 8px;
        }

        #name-input {
            width: 78%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid rgba(0, 200, 255, 0.25);
            background: rgba(255,255,255,0.06);
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            text-align: center;
            outline: none;
            caret-color: #00e5ff;
            user-select: text;
            -webkit-user-select: text;
            margin-bottom: 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #name-input::placeholder {
            color: rgba(150, 190, 230, 0.3);
            font-weight: 500;
        }

        #name-input:focus {
            border-color: rgba(0, 200, 255, 0.55);
            background: rgba(255,255,255,0.09);
            box-shadow: 0 0 20px rgba(0,200,255,0.12);
        }

        #play-btn {
            width: 78%;
            padding: 17px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #00c8ff, #0070ff);
            color: #fff;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(0,140,255,0.45);
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #play-btn:active {
            transform: scale(0.97);
        }

        #intro-credit {
            position: absolute;
            bottom: 28px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(120, 170, 220, 0.35);
            letter-spacing: 1px;
        }

        #intro-credit a {
            color: rgba(0, 200, 255, 0.5);
            text-decoration: none;
        }

        #intro-credit a:hover {
            color: rgba(0, 200, 255, 0.8);
        }

        /* ── Countdown overlay ───────────────────────────────── */
        #countdown {
            position: absolute;
            inset: 0;
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(4, 10, 24, 0.88);
        }

        #countdown.hidden { display: none; }

        #cd-sub {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: rgba(100, 200, 255, 0.55);
            height: 18px;
        }

        #cd-big {
            font-size: 116px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 60px rgba(0,200,255,0.7), 0 4px 20px rgba(0,0,0,0.5);
        }

        #cd-big.go {
            font-size: 46px;
            letter-spacing: 2px;
            color: #ffe500;
            text-shadow: 0 0 50px rgba(255,210,0,0.9), 0 4px 16px rgba(0,0,0,0.6);
        }

        @keyframes cdIn {
            from { transform: scale(0.35); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .cd-animate {
            animation: cdIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* ── Level transition overlay ────────────────────────── */
        #transition {
            position: absolute;
            inset: 0;
            z-index: 350;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(4, 10, 24, 0.9);
        }

        #transition.hidden { display: none; }

        @keyframes trIn {
            from { opacity: 0; transform: scale(0.88); }
            to   { opacity: 1; transform: scale(1); }
        }

        #transition:not(.hidden) {
            animation: trIn 0.35s ease-out forwards;
        }

        #tr-icon {
            font-size: 58px;
            line-height: 1;
            margin-bottom: 6px;
        }

        #tr-title {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00e6b4;
            text-shadow: 0 0 30px rgba(0,230,180,0.7);
        }

        #tr-pops {
            font-size: 16px;
            font-weight: 600;
            color: rgba(180, 220, 255, 0.7);
            letter-spacing: 2px;
        }

        #tr-next {
            margin-top: 14px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(100, 160, 255, 0.5);
        }

        #tr-buttons {
            display: flex;
            gap: 14px;
            margin-top: 28px;
        }

        #tr-buttons button {
            padding: 13px 28px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            touch-action: manipulation;
        }

        #tr-next-btn {
            background: linear-gradient(135deg, #00e5ff, #00ffa3);
            color: #040a18;
            box-shadow: 0 0 20px rgba(0,230,255,0.4);
        }

        #tr-quit-btn {
            background: transparent;
            color: rgba(180, 220, 255, 0.5);
            border: 2px solid rgba(180, 220, 255, 0.2) !important;
        }

        /* ── Game over overlay ───────────────────────────────── */
        #gameover {
            position: absolute;
            inset: 0;
            z-index: 450;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg,
                rgba(4, 10, 24, 0.97) 0%,
                rgba(8, 22, 50, 0.97) 50%,
                rgba(10, 50, 80, 0.97) 100%);
            overflow-y: auto;
            padding: 44px 22px 28px;
        }

        #gameover.hidden { display: none; }

        #go-title {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #ff4040;
            text-shadow: 0 0 40px rgba(255,50,50,0.7);
            margin-bottom: 4px;
        }

        #go-reached {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(140, 180, 220, 0.5);
            margin-bottom: 28px;
        }

        #go-results {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 28px;
        }

        .go-row {
            display: flex;
            flex-direction: column;
            padding: 11px 16px;
            border-radius: 12px;
            gap: 5px;
        }

        .go-row.passed {
            background: rgba(0, 230, 180, 0.07);
            border: 1px solid rgba(0, 230, 180, 0.22);
        }

        .go-row.failed {
            background: rgba(255, 60, 60, 0.07);
            border: 1px solid rgba(255, 60, 60, 0.28);
        }

        .go-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .go-lvl {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(150, 190, 230, 0.65);
            white-space: nowrap;
        }

        .go-pops {
            font-size: 17px;
            font-weight: 800;
            white-space: nowrap;
        }

        .go-row.passed .go-pops { color: #00e6b4; }
        .go-row.failed .go-pops { color: #ff5555; }

        .go-check {
            font-size: 16px;
            white-space: nowrap;
        }

        .go-row-stats {
            display: flex;
            gap: 16px;
        }

        .go-stat {
            font-size: 11px;
            font-weight: 600;
            color: rgba(160, 200, 240, 0.45);
            white-space: nowrap;
        }

        .go-buttons {
            display: flex;
            flex-direction: column;
            gap: 11px;
            width: 100%;
            margin-top: auto;
        }

        .go-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        #save-btn {
            background: linear-gradient(135deg, #00c0ff, #0070ff);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,130,255,0.4);
        }

        #play-again-btn {
            background: rgba(255,255,255,0.07);
            color: rgba(190, 215, 255, 0.85);
            border: 1.5px solid rgba(255,255,255,0.13);
        }

        /* ── Floor ───────────────────────────────────────────── */
        #floor {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 90px;
            background: linear-gradient(0deg,
                rgba(0,80,120,0.6) 0%,
                rgba(0,60,100,0.2) 60%,
                transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
<div id="game">

    <div id="hud">
        <div id="hud-row1">
            <span id="level-label">LEVEL 1</span>
            <span id="timer-secs">30</span>
        </div>
        <div id="timer-track">
            <div id="timer-fill"></div>
        </div>
        <div id="pop-counter">0 / 20 bubbles</div>
    </div>

    <div id="intro">
        <div id="intro-title">Pop <span>o'</span>Clock</div>
        <div id="intro-tagline">A bubble-popping break game</div>

        <input id="name-input" type="text" maxlength="24" placeholder="Enter your name…" autocomplete="off" spellcheck="false">
        <button id="play-btn">Play</button>
        <div id="intro-credit">Blame <a href="mailto:kevin.freitas@wwt.com">Kevin</a> for this</div>
    </div>

    <div id="countdown">
        <div id="cd-sub"></div>
        <div id="cd-big"></div>
    </div>

    <div id="transition" class="hidden">
        <div id="tr-icon">✓</div>
        <div id="tr-title">Level Cleared!</div>
        <div id="tr-pops"></div>
        <div id="tr-next"></div>
        <div id="tr-buttons">
            <button id="tr-next-btn">Next Level</button>
            <button id="tr-quit-btn">Quit</button>
        </div>
    </div>

    <div id="gameover" class="hidden">
        <div id="go-title">GAME OVER</div>
        <div id="go-reached"></div>
        <div id="go-results"></div>
        <div class="go-buttons">
            <button class="go-btn" id="save-btn">Save Results as PNG</button>
            <button class="go-btn" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <div id="floor"></div>
</div>

    const SOUND_RATE = { small: 1.4, medium: 1.0, large: 0.65 };
    let soundBuffers = { small: null, medium: null, large: null };

    function ac() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    async function loadSounds() {
        const ctx = ac();
        await Promise.all(Object.entries(SOUND_B64).map(async ( [key, b64] ) => {
            try {
                const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
                soundBuffers[key] = await ctx.decodeAudioData(bytes.buffer.slice(0));
            } catch ( e ) {
                console.warn('Sound load failed:', key);
            }
        }));
    }

    function playPop( size ) {
        const ctx = ac();
        const buf = soundBuffers[size];

        if (buf) {
            const src = ctx.createBufferSource();
            src.buffer       = buf;
            src.playbackRate.value = SOUND_RATE[size];
            src.connect(ctx.destination);
            src.start();
            return;
        }

        // Synthesis fallback while sounds load
        const now = ctx.currentTime;
        const cfg = {
            small:  { freq: 1050, dur: 0.09 },
            medium: { freq:  530, dur: 0.14 },
            large:  { freq:  220, dur: 0.23 },
        }[size];
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.frequency.setValueAtTime(cfg.freq * 2, now);
        osc.frequency.exponentialRampToValueAtTime(cfg.freq * 0.1, now + cfg.dur);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.0001, now + cfg.dur);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + cfg.dur + 0.02);
    }

    // ── Intro screen ─────────────────────────────────────────────────────────
    playBtnEl.addEventListener('pointerdown', ( e ) => {
        e.preventDefault();
        playerName = nameInput.value.trim();
        introEl.classList.add('hidden');
        loadSounds();
        runCountdown();
    });

    nameInput.addEventListener('keydown', ( e ) => {
        if (e.key === 'Enter') playBtnEl.dispatchEvent(new Event('pointerdown'));
    });

    // ── Countdown ────────────────────────────────────────────────────────────
    function runCountdown() {
        phase = 'countdown';
        cdEl.classList.remove('hidden');
        trEl.classList.add('hidden');
        goEl.classList.add('hidden');

        const steps = [
            { big: '5', sub: 'READY?', go: false },
            { big: '4', sub: 'READY?', go: false },
            { big: '3', sub: 'READY?', go: false },
            { big: '2', sub: 'READY?', go: false },
            { big: '1', sub: 'READY?', go: false },
            { big: "GET POPPIN'!", sub: '', go: true },
        ];

        let i = 0;

        function showStep() {
            const s = steps[i];
            cdBig.className = s.go ? 'go' : '';
            cdBig.textContent = s.big;
            cdSub.textContent = s.sub;
            void cdBig.offsetWidth;
            cdBig.classList.add('cd-animate');
            i++;
            if (i < steps.length) {
                setTimeout(showStep, 1000);
            } else {
                setTimeout(() => {
                    cdEl.classList.add('hidden');
                    beginLevel();
                }, 950);
            }
        }

        showStep();
    }

    // ── Level control ─────────────────────────────────────────────────────────
    function beginLevel() {
        popsThisLevel  = 0;
        bubblesSpawned = 0;
        tapsThisLevel  = 0;
        levelStartTime = performance.now();
        lastTimerSec   = LEVEL_DURATION;
        phase          = 'playing';

        levelLbl.textContent       = 'LEVEL ' + level;
        timerFill.style.width      = '100%';
        timerFill.style.background = 'linear-gradient(90deg, #00e5ff, #00ffa3)';
        timerFill.style.boxShadow  = '0 0 10px rgba(0,230,255,0.6)';
        timerSecs.textContent      = LEVEL_DURATION;
        updatePopCounter();
    }

    function endLevel() {
        phase = 'transitioning';
        clearBubbles();

        const passed = popsThisLevel >= POPS_REQUIRED;
        levelHistory.push({ level, pops: popsThisLevel, spawned: bubblesSpawned, taps: tapsThisLevel, passed });

        if (passed) {
            showTransition();
        } else {
            showGameOver();
        }
    }

    function showTransition() {
        trPops.textContent = popsThisLevel + ' bubbles popped';
        trNext.textContent = '→ LEVEL ' + (level + 1);
        trEl.classList.remove('hidden');
    }

    trNextBtn.addEventListener('pointerdown', ( e ) => {
        e.preventDefault();
        if (phase !== 'transitioning') return;
        trEl.classList.add('hidden');
        level++;
        runCountdown();
    });

    trQuitBtn.addEventListener('pointerdown', ( e ) => {
        e.preventDefault();
        if (phase !== 'transitioning') return;
        trEl.classList.add('hidden');
        showGameOver();
    });

    function showGameOver() {
        const who = playerName ? playerName + ' reached level ' + level : 'You reached level ' + level;
        goReached.textContent = who;
        renderGoResults();
        goEl.classList.remove('hidden');
    }

    function renderGoResults() {
        goResults.innerHTML = '';
        levelHistory.forEach(( entry ) => {
            const acc = entry.taps > 0 ? Math.round((entry.pops / entry.taps) * 100) : 0;
            const row = document.createElement('div');
            row.className = 'go-row ' + (entry.passed ? 'passed' : 'failed');
            row.innerHTML =
                '<div class="go-row-top">' +
                    '<span class="go-lvl">Level ' + entry.level + '</span>' +
                    '<span class="go-pops">' + entry.pops + ' popped</span>' +
                    '<span class="go-check">' + (entry.passed ? '✓' : '✗') + '</span>' +
                '</div>' +
                '<div class="go-row-stats">' +
                    '<span class="go-stat">' + entry.spawned + ' spawned</span>' +
                    '<span class="go-stat">' + entry.taps + ' taps</span>' +
                    '<span class="go-stat">' + acc + '% accuracy</span>' +
                '</div>';
            goResults.appendChild(row);
        });
    }

    // ── Utilities ────────────────────────────────────────────────────────────
    function gw() { return game.clientWidth; }
    function gh() { return game.clientHeight; }

    function spawnInterval() {
        return Math.max(112, Math.round((1200 - (level - 1) * 65) / 2.5));
    }

    function baseSpeed() {
        return Math.pow(1.6, level - 1);
    }

    function pickSize() {
        const t = Math.min((level - 1) / 9, 1); // 0 at level 1, 1 at level 10+
        const w = {
            large:  7 - t * 5,   // 7 → 2
            medium: 3,            // constant
            small:  1 + t * 6,   // 1 → 7
        };
        const total = w.large + w.medium + w.small;
        let r = Math.random() * total;
        for (const k of SIZE_KEYS) {
            r -= w[k];
            if (r <= 0) return k;
        }
        return 'large';
    }

    function clearBubbles() {
        for (const b of bubbles) b.el.remove();
        bubbles = [];
    }

    function updatePopCounter() {
        popCounter.textContent = popsThisLevel + ' / ' + POPS_REQUIRED + ' bubbles';
        popCounter.classList.toggle('met', popsThisLevel >= POPS_REQUIRED);
    }

    // ── Bubble spawning ──────────────────────────────────────────────────────
    function spawnBubble() {
        const size = pickSize();
        const cfg  = SIZES[size];
        const w    = gw();
        const h    = gh();
        const spd  = baseSpeed() * (0.72 + Math.random() * 0.56);
        const bx   = cfg.d * 0.6 + Math.random() * (w - cfg.d * 1.2);
        const [r, g, b] = cfg.rgb;

        const minY   = h * 0.5 + cfg.d / 2;
        const maxY   = h - 70 - cfg.d / 2;
        const startY = minY + Math.random() * Math.max(0, maxY - minY);

        const el = document.createElement('div');
        el.className = 'bubble bubble-spawn';
        el.style.cssText = `
            width: ${cfg.d}px;
            height: ${cfg.d}px;
            left: ${bx}px;
            top: ${startY - cfg.d / 2}px;
            background: radial-gradient(circle at 34% 30%,
                rgba(255,255,255,0.68) 0%,
                rgba(${r},${g},${b},0.42) 42%,
                rgba(${Math.max(r-45,0)},${Math.max(g-45,0)},${Math.max(b-25,0)},0.78) 100%);
            border: 1.5px solid rgba(${Math.min(r+70,255)},${Math.min(g+70,255)},${Math.min(b+70,255)},0.5);
            box-shadow:
                inset 0 0 ${Math.round(cfg.d * 0.28)}px rgba(${r},${g},${Math.min(b+70,255)},0.28),
                0 0 ${Math.round(cfg.d * 0.18)}px rgba(${r},${g},${b},0.38);
        `;

        const s1 = document.createElement('div'); s1.className = 'shine';
        const s2 = document.createElement('div'); s2.className = 'shine2';
        el.appendChild(s1);
        el.appendChild(s2);
        game.appendChild(el);

        const bubble = {
            id:     Math.random(),
            size,   cfg,
            x:      bx,
            y:      startY,
            baseX:  bx,
            spd,
            wobAmp:  2  + Math.random() * 3,
            wobFreq: 0.4 + Math.random() * 1.3,
            wobOff:  Math.random() * Math.PI * 2,
            age:    0,
            spawnDelay: 350,
            el,
            dead:   false,
        };

        el.addEventListener('pointerdown', ( e ) => {
            e.preventDefault();
            if (!bubble.dead && phase === 'playing') doPop(bubble);
        });

        bubbles.push(bubble);
        bubblesSpawned++;
    }

    // ── Popping ──────────────────────────────────────────────────────────────
    function doPop( b ) {
        b.dead = true;
        playPop(b.size);

        const el = b.el;
        el.style.animation     = 'none';
        el.style.transition    = 'transform 0.17s ease-out, opacity 0.17s ease-out';
        el.style.transformOrigin = '50% 50%';
        requestAnimationFrame(() => {
            el.style.transform = 'scale(1.65)';
            el.style.opacity   = '0';
        });
        setTimeout(() => el.remove(), 200);

        spawnParticles(b);

        popsThisLevel++;
        updatePopCounter();

        popCounter.classList.remove('pop-punch');
        void popCounter.offsetWidth;
        popCounter.classList.add('pop-punch');
    }

    // ── Particles ────────────────────────────────────────────────────────────
    function spawnParticles( b ) {
        const count = { small: 7, medium: 10, large: 13 }[b.size];
        const [r, g, bl] = b.cfg.rgb;

        for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
            const spd   = 55 + Math.random() * 95;
            const sz    = 3  + Math.random() * 7;

            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `
                width:${sz}px; height:${sz}px;
                left:${b.x}px; top:${b.y}px;
                transform:translate(-50%,-50%);
                background: rgba(${Math.min(r+70,255)},${Math.min(g+70,255)},${Math.min(bl+70,255)},0.9);
            `;
            game.appendChild(p);

            const vx  = Math.cos(angle) * spd;
            const vy  = Math.sin(angle) * spd;
            const t0  = performance.now();
            const dur = 360 + Math.random() * 200;

            (function animate( now ) {
                const t = Math.min((now - t0) / dur, 1);
                p.style.left      = (b.x + vx * t) + 'px';
                p.style.top       = (b.y + vy * t + 65 * t * t) + 'px';
                p.style.opacity   = String(1 - t);
                p.style.transform = `translate(-50%,-50%) scale(${1 - t * 0.5})`;
                if (t < 1) requestAnimationFrame(animate); else p.remove();
            })(performance.now());
        }
    }

    // ── Save as PNG ──────────────────────────────────────────────────────────
    function saveResults() {
        const W     = 390;
        const ROW_H = 72;
        const H     = Math.max(460, 240 + levelHistory.length * ROW_H + 80);
        const DPR   = 2;

        const canvas  = document.createElement('canvas');
        canvas.width  = W * DPR;
        canvas.height = H * DPR;
        const ctx     = canvas.getContext('2d');
        ctx.scale(DPR, DPR);

        // Background
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0,   '#08101e');
        bg.addColorStop(0.5, '#0b2440');
        bg.addColorStop(1,   '#0d5070');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Ambient bubble decorations
        for (let i = 0; i < 14; i++) {
            const bx = Math.random() * W;
            const by = Math.random() * H;
            const br = 4 + Math.random() * 28;
            ctx.beginPath();
            ctx.arc(bx, by, br, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(100,180,255,0.07)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // Title
        ctx.save();
        ctx.shadowColor = 'rgba(0,200,255,0.8)';
        ctx.shadowBlur  = 28;
        ctx.fillStyle   = '#ffffff';
        ctx.font        = '900 38px system-ui, -apple-system, sans-serif';
        ctx.textAlign   = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText("Pop o'Clock", W / 2, 36);
        ctx.restore();

        // Game over text
        ctx.fillStyle    = '#ff4040';
        ctx.font         = '800 17px system-ui, -apple-system, sans-serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('GAME OVER', W / 2, 90);

        // Reached level
        ctx.fillStyle    = 'rgba(130,170,210,0.5)';
        ctx.font         = '600 12px system-ui, -apple-system, sans-serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('You reached Level ' + level, W / 2, 114);

        // Divider
        ctx.strokeStyle = 'rgba(255,255,255,0.09)';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(32, 138);
        ctx.lineTo(W - 32, 138);
        ctx.stroke();

        // Level rows
        levelHistory.forEach(( entry, i ) => {
            const rowY = 150 + i * ROW_H;
            const rowH = ROW_H - 8;
            const cx   = W / 2;

            // Row background using manual rounded rect
            const rx = 26, ry = rowY, rw = W - 52, rh = rowH, rad = 10;
            ctx.beginPath();
            ctx.moveTo(rx + rad, ry);
            ctx.lineTo(rx + rw - rad, ry);
            ctx.arcTo(rx + rw, ry, rx + rw, ry + rad, rad);
            ctx.lineTo(rx + rw, ry + rh - rad);
            ctx.arcTo(rx + rw, ry + rh, rx + rw - rad, ry + rh, rad);
            ctx.lineTo(rx + rad, ry + rh);
            ctx.arcTo(rx, ry + rh, rx, ry + rh - rad, rad);
            ctx.lineTo(rx, ry + rad);
            ctx.arcTo(rx, ry, rx + rad, ry, rad);
            ctx.closePath();

            ctx.fillStyle   = entry.passed ? 'rgba(0,230,180,0.07)' : 'rgba(255,60,60,0.07)';
            ctx.fill();
            ctx.strokeStyle = entry.passed ? 'rgba(0,230,180,0.2)' : 'rgba(255,60,60,0.2)';
            ctx.lineWidth   = 1;
            ctx.stroke();

            const topY  = rowY + 14;
            const botY  = rowY + rowH - 14;
            const acc   = entry.taps > 0 ? Math.round((entry.pops / entry.taps) * 100) : 0;

            // Level label
            ctx.fillStyle    = 'rgba(150,190,230,0.6)';
            ctx.font         = '700 11px system-ui, -apple-system, sans-serif';
            ctx.textAlign    = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText('LEVEL ' + entry.level, rx + 12, topY);

            // Pops
            ctx.fillStyle    = entry.passed ? '#00e6b4' : '#ff5555';
            ctx.font         = '800 18px system-ui, -apple-system, sans-serif';
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(entry.pops + ' popped', cx, topY);

            // Status
            ctx.font         = '700 15px system-ui, -apple-system, sans-serif';
            ctx.textAlign    = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText(entry.passed ? '✓' : '✗', rx + rw - 12, topY);

            // Stats row
            ctx.fillStyle    = 'rgba(160,200,240,0.4)';
            ctx.font         = '600 11px system-ui, -apple-system, sans-serif';
            ctx.textAlign    = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(entry.spawned + ' spawned  ·  ' + entry.taps + ' taps  ·  ' + acc + '% accuracy', rx + 12, botY);
        });

        // Footer
        const footerY = 162 + levelHistory.length * ROW_H;
        ctx.fillStyle    = 'rgba(100,140,190,0.35)';
        ctx.font         = '500 11px system-ui, -apple-system, sans-serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        const credit = (playerName ? playerName + '  ·  ' : '') + 'Pop o\'Clock  ·  ' + new Date().toLocaleDateString();
        ctx.fillText(credit, W / 2, footerY);

        const link    = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0, 10);
        link.download = 'pop-oclock-level' + level + '-' + dateStr + '.png';
        link.href     = canvas.toDataURL('image/png');
        link.click();
    }

    // ── Tap counter ──────────────────────────────────────────────────────────
    game.addEventListener('pointerdown', () => {
        if (phase === 'playing') tapsThisLevel++;
    });

    // ── Button listeners ─────────────────────────────────────────────────────
    saveBtnEl.addEventListener('pointerdown', ( e ) => {
        e.preventDefault();
        saveResults();
    });

    playAgain.addEventListener('pointerdown', ( e ) => {
        e.preventDefault();
        level         = 1;
        popsThisLevel = 0;
        levelHistory  = [];
        clearBubbles();
        goEl.classList.add('hidden');
        nameInput.value = playerName;
        introEl.classList.remove('hidden');
    });

    // ── Game loop ────────────────────────────────────────────────────────────
    function loop( now ) {
        const dt   = Math.min(now - lastFrame, 50) || 16;
        lastFrame  = now;
        const norm = dt / 16.667;

        if (phase === 'playing') {
            const elapsed   = now - levelStartTime;
            const remaining = Math.max(0, LEVEL_DURATION * 1000 - elapsed);
            const pct       = remaining / (LEVEL_DURATION * 1000);

            timerFill.style.width = (pct * 100) + '%';

            if (pct > 0.4) {
                timerFill.style.background  = 'linear-gradient(90deg, #00e5ff, #00ffa3)';
                timerFill.style.boxShadow   = '0 0 10px rgba(0,230,255,0.6)';
            } else if (pct > 0.18) {
                timerFill.style.background  = 'linear-gradient(90deg, #ffcc00, #ff9900)';
                timerFill.style.boxShadow   = '0 0 10px rgba(255,160,0,0.6)';
            } else {
                timerFill.style.background  = 'linear-gradient(90deg, #ff4444, #ff0000)';
                timerFill.style.boxShadow   = '0 0 10px rgba(255,0,0,0.6)';
            }

            const secs = Math.ceil(remaining / 1000);
            if (secs !== lastTimerSec) {
                lastTimerSec          = secs;
                timerSecs.textContent = secs;
            }

            if (now - lastSpawn > spawnInterval()) {
                spawnBubble();
                lastSpawn = now;
            }

            if (remaining <= 0) endLevel();
        }

        const h = gh();
        for (let i = bubbles.length - 1; i >= 0; i--) {
            const b = bubbles[i];
            if (b.dead) { bubbles.splice(i, 1); continue; }

            b.age += dt;
            if (b.age < b.spawnDelay) continue;
            b.y   -= b.spd * norm;

            const wx = b.baseX + Math.sin(
                b.age * 0.001 * b.wobFreq * Math.PI * 2 + b.wobOff
            ) * b.wobAmp;

            b.x             = wx;
            b.el.style.left = wx + 'px';
            b.el.style.top  = (b.y - b.cfg.d / 2) + 'px';

            if (b.y < -b.cfg.d) { b.el.remove(); bubbles.splice(i, 1); }
        }

        requestAnimationFrame(loop);
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    requestAnimationFrame(loop);
</script>
</body>
</html>
