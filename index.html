<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>experiments</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            color-scheme: light dark;
            --bg: #fafafa;
            --fg: #1a1a1a;
            --muted: #666;
            --card: #fff;
            --border: #e5e5e5;
            --accent: #2a6df4;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111;
                --fg: #eee;
                --muted: #999;
                --card: #1c1c1c;
                --border: #2a2a2a;
                --accent: #6aa3ff;
            }
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var( --bg );
            color: var( --fg );
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1.5rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            letter-spacing: -0.02em;
        }
        .tagline {
            color: var( --muted );
            margin: 0 0 3rem;
            font-size: 1.05rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat( 2, 1fr );
            gap: 1rem;
            width: 100%;
            max-width: 800px;
        }
        @media ( max-width: 480px ) {
            .grid { grid-template-columns: 1fr; }
        }
        a.card {
            display: flex;
            flex-direction: column;
            background: var( --card );
            border: 1px solid var( --border );
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }
        a.card:hover {
            transform: translateY( -2px );
            border-color: var( --accent );
        }
        .card-thumb {
            width: 100%;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            background: #111;
            flex-shrink: 0;
        }
        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .card-body {
            padding: 1rem 1.25rem 1.25rem;
        }
        a.card h2 {
            margin: 0 0 0.25rem;
            font-size: 1.1rem;
            font-weight: 600;
        }
        a.card p {
            margin: 0;
            color: var( --muted );
            font-size: 0.9rem;
        }
        footer {
            margin-top: 4rem;
            color: var( --muted );
            font-size: 0.85rem;
        }
        footer a { color: var( --accent ); }
    </style>
</head>
<body>
    <h1>experiments by Kevin</h1>
    <p class="tagline">A small collection of standalone web things.</p>

    <div class="grid">
        <a class="card" href="Pop%20o'Clock/">
            <div class="card-thumb">
                <img src="screenshots/pop-oclock.png" alt="Pop o'Clock screenshot" style="object-position: center 18%;">
            </div>
            <div class="card-body">
                <h2>Pop o'Clock</h2>
                <p>Test your hand-eye-mouse coordination with this simple game</p>
            </div>
        </a>
        <a class="card" href="Pic%20Shop/">
            <div class="card-thumb">
                <img src="screenshots/pic-shop.png" alt="Pic Shop screenshot">
            </div>
            <div class="card-body">
                <h2>Pic Shop</h2>
                <p>Basic layer-based image editor</p>
            </div>
        </a>
        <a class="card" href="Pixel%20Pics/">
            <div class="card-thumb">
                <img src="screenshots/pixel-pics.png" alt="Pixel Pics screenshot">
            </div>
            <div class="card-body">
                <h2>Pixel Pics</h2>
                <p>Pixel art converstion tool</p>
            </div>
        </a>
        <a class="card" href="Vid%20Stacker%20Web/">
            <div class="card-thumb">
                <img src="screenshots/vid-stacker.png" alt="Vid Stacker screenshot">
            </div>
            <div class="card-body">
                <h2>Vid Stacker</h2>
                <p>Video frame stacker</p>
            </div>
        </a>
    </div>

    <footer>
        <a href="https://github.com/kevin-freitas-wwt/experiments">View source on GitHub</a>
    </footer>
</body>
</html>
