<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Branches — Team Movement</title>
    <!-- Open Graph / social preview -->
    <meta name="description" content="Branching timeline of people moving between groups over time.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="experiments by Kevin">
    <meta property="og:title" content="Timeline Branches">
    <meta property="og:description" content="Branching timeline of people moving between groups over time.">
    <meta property="og:url" content="https://kevin-freitas-wwt.github.io/experiments/Timeline%20Branches/">
    <meta property="og:image" content="https://kevin-freitas-wwt.github.io/experiments/Timeline%20Branches/thumb.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Timeline Branches">
    <meta name="twitter:description" content="Branching timeline of people moving between groups over time.">
    <meta name="twitter:image" content="https://kevin-freitas-wwt.github.io/experiments/Timeline%20Branches/thumb.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="masthead">
        <div class="masthead__row">
            <h1 id="title"></h1>
            <label class="picker">Dataset
                <select id="dataset"></select>
            </label>
        </div>
        <p id="caption"></p>
    </header>

    <section class="toolbar">
        <input id="search" class="toolbar__search" type="search" placeholder="Search team or location">
        <label class="toolbar__range">From <input id="from" class="toolbar__year" type="number" step="1"></label>
        <label class="toolbar__range">To <input id="to" class="toolbar__year" type="number" step="1"></label>
        <button id="clear" class="toolbar__clear" type="button">Reset</button>
    </section>

    <main class="stage">
        <div id="lanes" class="lanes"></div>
        <div id="scroller" class="scroller">
            <div id="chart" class="chart"></div>
        </div>
        <aside id="detail" class="detail"></aside>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
