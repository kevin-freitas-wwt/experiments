<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>911 Calls — Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1419;
            --panel: #1a212b;
            --panel-2: #222c38;
            --text: #e6edf3;
            --muted: #8b98a5;
            --accent: #d23f3f;
            --border: #2d3743;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
        }
        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        header h1 { margin: 0; font-size: 20px; font-weight: 600; }
        header .sub { color: var(--muted); font-size: 13px; }
        .src-link { color: inherit; text-decoration: underline; text-decoration-color: rgba(139, 152, 165, 0.5); text-underline-offset: 2px; }
        .wrap { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
        .cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            min-width: 150px;
            flex: 1;
        }
        .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
        .card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
        }
        .panel h2 { margin: 0 0 16px; font-size: 15px; font-weight: 600; }
        .filters { max-height: 520px; overflow-y: auto; }
        .filter-actions { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn {
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn:hover { background: var(--border); }
        .ftype { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; cursor: pointer; }
        .ftype input { cursor: pointer; }
        .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
        .ftype .cnt { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; }
        .chart-box { position: relative; height: 460px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
        td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
        .type-tbl { max-height: 460px; overflow-y: auto; }
        .bar-cell { position: relative; }
        .bar-fill { position: absolute; left: 0; top: 0; bottom: 0; opacity: 0.18; border-radius: 3px; }
        .mt { margin-top: 24px; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>911 Call Activity</h1>

                <div id="filterList"></div>
            </div>

            <div>
                <div class="panel">
                    <h2>Records by month, broken down by type</h2>
                    <div class="chart-box"><canvas id="monthChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

        // ---- derive dimensions ----
        const allTypes = [ ...new Set( DATA.map( d => d.type ) ) ].sort();
        const allMonths = [ ...new Set( DATA.map( d => ( d.datetime || "" ).slice( 0, 7 ) ).filter( Boolean ) ) ].sort();

        const monthLabel = ( m ) => {
            const [ y, mo ] = m.split( "-" );
            const names = [ "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec" ];
            return names[ parseInt( mo, 10 ) - 1 ] + " " + y;
        };

        // stable color per type via golden-angle hue spread
        const colorFor = ( i ) => {
            const hue = ( i * 137.508 ) % 360;
            return "hsl(" + hue.toFixed( 1 ) + " 62% 55%)";
        };
        const typeColor = {};
        allTypes.forEach( ( t, i ) => { typeColor[ t ] = colorFor( i ); } );

        const active = new Set( allTypes );

        // ---- chart ----
        const ctx = document.getElementById( "monthChart" ).getContext( "2d" );
        Chart.defaults.color = "#8b98a5";
        Chart.defaults.borderColor = "#2d3743";

        const seriesFor = ( t ) => allMonths.map( m =>
            DATA.filter( d => d.type === t && ( d.datetime || "" ).slice( 0, 7 ) === m ).length );

        // total calls per month across the active types (top of each stack)
        const monthlyTotals = () => allMonths.map( ( m, i ) =>
            allTypes.filter( t => active.has( t ) ).reduce( ( s, t ) => s + seriesFor( t )[ i ], 0 ) );

        const buildDatasets = () => {
            const bars = allTypes.filter( t => active.has( t ) ).map( t => ( {
                label: t,
                data: seriesFor( t ),
                backgroundColor: typeColor[ t ],
                borderWidth: 0,
                yAxisID: "y",
                order: 1
            } ) );
            const totalLine = {
                type: "line",
                label: "Total",
                data: monthlyTotals(),
                borderColor: "#ffffff",
                backgroundColor: "#ffffff",
                borderWidth: 2,
                tension: 0,
                fill: false,
                pointRadius: 3,
                pointHoverRadius: 5,
                yAxisID: "yLine",
                order: 0
            };
            return bars.concat( totalLine );
        };

        const chart = new Chart( ctx, {
            type: "bar",
            data: { labels: allMonths.map( monthLabel ), datasets: buildDatasets() },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: "index", intersect: false },
                scales: {
                    x: { stacked: true, grid: { display: false } },
                    y: { stacked: true, beginAtZero: true, ticks: { precision: 0 } },
                    yLine: { display: false, stacked: false, beginAtZero: true, position: "right" }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        // the white line mirrors the stacked total; keep it out of the per-type list
                        filter: ( item ) => item.dataset.type !== "line",
                        callbacks: {
                            footer: ( items ) => "Total: " + items.reduce( ( s, i ) => s + i.parsed.y, 0 )
                        }
                    }
                }
            }
        } );

        // ---- filter UI ----
        const filterList = document.getElementById( "filterList" );
        const typeCounts = {};
        allTypes.forEach( t => { typeCounts[ t ] = DATA.filter( d => d.type === t ).length; } );

        allTypes.slice().sort( ( a, b ) => typeCounts[ b ] - typeCounts[ a ] ).forEach( t => {
            const row = document.createElement( "label" );
            row.className = "ftype";
            row.innerHTML =
                '<input type="checkbox" checked data-type="' + t.replace( /"/g, "&quot;" ) + '">' +
                '<span class="swatch" style="background:' + typeColor[ t ] + '"></span>' +
                '<span>' + t + '</span>' +
                '<span class="cnt">' + typeCounts[ t ] + '</span>';
            filterList.appendChild( row );
        } );

        filterList.addEventListener( "change", ( e ) => {
            const cb = e.target;
            if ( cb.tagName !== "INPUT" ) return;
            const t = cb.getAttribute( "data-type" );
            if ( cb.checked ) active.add( t ); else active.delete( t );
            refresh();
        } );

        const setAll = ( on ) => {
            filterList.querySelectorAll( "input" ).forEach( cb => { cb.checked = on; } );
            active.clear();
            if ( on ) allTypes.forEach( t => active.add( t ) );
            refresh();
        };
        document.getElementById( "selAll" ).addEventListener( "click", () => setAll( true ) );
        document.getElementById( "selNone" ).addEventListener( "click", () => setAll( false ) );

        // ---- refresh all views from active set ----
        const refresh = () => {
            chart.data.datasets = buildDatasets();
            const m = Math.max( 1, ...monthlyTotals() );
            chart.options.scales.y.max = m;
            chart.options.scales.yLine.max = m;
            chart.update();
        };

        refresh();
    </script>
