<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Waymarker</title>
    <!-- Open Graph / social preview -->
    <meta name="description" content="Browser-based AR peak-finder that labels the mountains around you.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="experiments by Kevin">
    <meta property="og:title" content="Waymarker">
    <meta property="og:description" content="Browser-based AR peak-finder that labels the mountains around you.">
    <meta property="og:url" content="https://kevin-freitas-wwt.github.io/experiments/Waymarker/">
    <meta property="og:image" content="https://kevin-freitas-wwt.github.io/experiments/Waymarker/thumb.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Waymarker">
    <meta name="twitter:description" content="Browser-based AR peak-finder that labels the mountains around you.">
    <meta name="twitter:image" content="https://kevin-freitas-wwt.github.io/experiments/Waymarker/thumb.png">
    <meta name="theme-color" content="#5b7fa6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Waymarker">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="scene"></canvas>

    <div id="controls">
        <button id="recenter" class="control-btn hidden" type="button" aria-label="Re-center on compass">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        </button>
        <button id="camera-toggle" class="control-btn" type="button" aria-label="Toggle camera">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 2 7.2 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2h-3.2L15 2H9zm3 5a5 5 0 110 10 5 5 0 010-10zm0 2a3 3 0 100 6 3 3 0 000-6z"/></svg>
        </button>
        <button id="settings-gear" class="control-btn" type="button" aria-label="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94a7.49 7.49 0 000-1.88l2.03-1.58a.5.5 0 00.12-.64l-1.92-3.32a.5.5 0 00-.61-.22l-2.39.96a7.3 7.3 0 00-1.62-.94l-.36-2.54a.5.5 0 00-.5-.42h-3.84a.5.5 0 00-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 00-.61.22L2.69 8.84a.5.5 0 00.12.64l2.03 1.58a7.49 7.49 0 000 1.88l-2.03 1.58a.5.5 0 00-.12.64l1.92 3.32c.13.22.39.31.61.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54c.05.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.09.48 0 .61-.22l1.92-3.32a.5.5 0 00-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1112 8.5a3.5 3.5 0 010 7z"/></svg>
        </button>
    </div>

    <div id="settings-panel" class="hidden">
        <div class="settings-scroll">
            <div class="opt-group">
                <span class="opt-label">Units</span>
                <div class="seg" data-setting="units">
                    <button data-value="mi" type="button">mi</button>
                    <button data-value="km" type="button">km</button>
                </div>
            </div>
            <div class="opt-group">
                <span class="opt-label">Within (<span class="within-unit">mi</span>)</span>
                <div class="dropdown" data-setting="within">
                    <button class="dropdown-trigger" type="button">
                        <span class="dropdown-value">100</span>
                        <span class="dropdown-caret" aria-hidden="true">&#9652;</span>
                    </button>
                    <div class="dropdown-menu hidden">
                        <button data-value="25" type="button">25</button>
                        <button data-value="50" type="button">50</button>
                        <button data-value="100" type="button">100</button>
                    </div>
                </div>
            </div>
            <div class="opt-group">
                <span class="opt-label">Above (<span class="elev-unit">ft</span>)</span>
                <div class="dropdown" data-setting="minTier">
                    <button class="dropdown-trigger" type="button">
                        <span class="dropdown-value">5,000</span>
                        <span class="dropdown-caret" aria-hidden="true">&#9652;</span>
                    </button>
                    <div class="dropdown-menu hidden">
                        <button data-value="0" type="button">5,000</button>
                        <button data-value="1" type="button">7,500</button>
                        <button data-value="2" type="button">10,000</button>
                    </div>
                </div>
            </div>
            <div class="opt-group">
                <span class="opt-label">Names</span>
                <div class="seg" data-setting="names">
                    <button data-value="native" type="button">Native</button>
                    <button data-value="western" type="button">Western</button>
                </div>
            </div>
            <div class="opt-group">
                <span class="opt-label">Sun/Moon</span>
                <div class="seg" data-setting="celestial">
                    <button data-value="on" type="button">On</button>
                    <button data-value="off" type="button">Off</button>
                </div>
            </div>
            <div class="opt-group">
                <span class="opt-label">Colors</span>
                <div class="dropdown" data-setting="theme">
                    <button class="dropdown-trigger" type="button">
                        <span class="dropdown-value">Field</span>
                        <span class="dropdown-caret" aria-hidden="true">&#9652;</span>
                    </button>
                    <div class="dropdown-menu hidden">
                        <button data-value="field" type="button">Field</button>
                        <button data-value="mono" type="button">Mono</button>
                        <button data-value="dusk" type="button">Dusk</button>
                        <button data-value="red" type="button">Red</button>
                    </div>
                </div>
            </div>
            <div class="opt-group">
                <span class="opt-label">Lat</span>
                <input id="sim-lat" class="opt-input" type="number" step="0.0001" value="47.6062">
            </div>
            <div class="opt-group">
                <span class="opt-label">Lon</span>
                <input id="sim-lon" class="opt-input" type="number" step="0.0001" value="-122.3321">
            </div>
            <div class="opt-group">
                <span class="opt-label">GPS</span>
                <button id="loc-target" class="loc-btn" type="button" aria-label="Re-center on device GPS">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8.94 3A8.99 8.99 0 0013 3.06V1h-2v2.06A8.99 8.99 0 003.06 11H1v2h2.06A8.99 8.99 0 0011 20.94V23h2v-2.06A8.99 8.99 0 0020.94 13H23v-2zM12 19a7 7 0 110-14 7 7 0 010 14z"/></svg>
                </button>
            </div>
        </div>
        <button id="settings-close" type="button" aria-label="Close settings">&times;</button>
    </div>

    <div id="overlay">
        <div class="overlay-card">
            <h1>Waymarker</h1>
            <p>Hold up your phone &mdash; or drag &mdash; to pan the horizon and name the peaks around you.</p>
            <button id="start" type="button">Start</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
