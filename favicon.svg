<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <clipPath id="flask-clip">
            <path d="M26 9 h12 v17 L52 57 H12 L26 26 Z"/>
        </clipPath>
    </defs>

    <!-- Flask body (empty/upper area) -->
    <path d="M26 9 h12 v17 L52 57 H12 L26 26 Z" fill="#f8fafc"/>

    <!-- Green liquid fill -->
    <rect x="0" y="39" width="64" height="22" fill="#22c55e" clip-path="url(#flask-clip)"/>

    <!-- Bubbles -->
    <circle cx="27" cy="48" r="3.5" fill="white" fill-opacity="0.55" clip-path="url(#flask-clip)"/>
    <circle cx="39" cy="44" r="2.5" fill="white" fill-opacity="0.5" clip-path="url(#flask-clip)"/>
    <circle cx="33" cy="54" r="2"   fill="white" fill-opacity="0.45" clip-path="url(#flask-clip)"/>

    <!-- Flask outline -->
    <path d="M26 9 h12 v17 L52 57 H12 L26 26 Z"
          fill="none" stroke="#1e293b" stroke-width="3"
          stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Rim -->
    <rect x="22" y="5" width="20" height="5" rx="1.5" fill="#1e293b"/>
</svg>
